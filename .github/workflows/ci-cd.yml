name: CI/CD Pipeline

# 触发条件：推送到 main/master 分支，或者创建 PR
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 环境变量：使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 权限配置
permissions:
  contents: read
  pages: write
  id-token: write

# 允许同时进行一个部署，队列中等待的会被取消
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 阶段1: 代码检查和测试
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: |
          if [ -f ".eslintrc.json" ]; then
            npm run lint
          fi

      - name: Run tests
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          fi

  # 阶段2: 构建并部署到 GitHub Pages
  deploy:
    needs: lint-test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy kids-learning static files to dist
        run: |
          mkdir -p dist/kids-learning
          cp kids-learning/*.html dist/kids-learning/
          cp kids-learning/*.css dist/kids-learning/
          cp kids-learning/*.js dist/kids-learning/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
